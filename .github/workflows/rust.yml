      run: cargo xtask precheck --nextest-report
    - name: Fail if any tests failed
      if: ${{ steps.test-mock.outcome == 'failure' }}
      run: |
        echo "One or more tests failed."
        exit 1

  test_windows_api:

    runs-on: windows-2025-vs2026

    defaults:
      run:
        working-directory: .

    steps:
