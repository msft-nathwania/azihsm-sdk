name: Windows Setup
description: Restore Cargo cache and run setup on cache miss
outputs:
  cache-hit:
    description: Whether the Cargo cache was restored
    value: ${{ steps.cargo-cache.outputs.cache-hit }}
runs:
  using: composite
  steps:
    - name: Restore Cargo cache
      id: cargo-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_ID }}
    - name: Setup on cache miss
      if: steps.cargo-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: cargo xtask precheck --setup
