name: "CodeQL Advanced"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: '0 8 * * *'  # Daily at midnight PST (8 AM UTC)
env:
  CARGO_TERM_COLOR: always
  CACHE_KEY_ID: 84f8acac52412db91407ab9f85776987da17d42f

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: rust
            build-mode: none

    env:
      LD_LIBRARY_PATH: /opt/openssl-3.0.3/lib

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install apt packages
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libbsd-dev

    - name: Cache OpenSSL 3.0.3
      id: cache-openssl
      uses: actions/cache@v5
      with:
        path: /opt/openssl-3.0.3
        key: openssl-3.0.3-shared-linux-x64

    - name: Build OpenSSL 3.0.3 (shared)
      if: steps.cache-openssl.outputs.cache-hit != 'true'
      run: |
        curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-3.0.3/openssl-3.0.3.tar.gz" \
          | tar xz -C /tmp
        cd /tmp/openssl-3.0.3
        ./Configure --prefix=/opt/openssl-3.0.3 --libdir=lib
        make -j"$(nproc)"
        sudo make install_sw

    - name: Restore Cargo cache
      id: cargo-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_ID }}

    - name: Setup on cache miss
      if: steps.cargo-cache.outputs.cache-hit != 'true'
      run: cargo xtask precheck --setup

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        queries: security-extended,security-and-quality
      env:
        CODEQL_EXTRACTOR_RUST_OPTION_CARGO_CFG_OVERRIDES: "-test"
        CODEQL_ACTION_FILE_COVERAGE_ON_PRS: "true"

    - name: Run manual build steps
      if: matrix.build-mode == 'manual'
      shell: bash
      env:
        OPENSSL_DIR: /opt/openssl-3.0.3
      run: |
        cargo xtask build --release --package azihsm_ossl_provider

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
