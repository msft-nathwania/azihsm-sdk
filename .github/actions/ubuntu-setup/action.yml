name: Ubuntu Setup
description: Install apt packages, restore Cargo cache, and run setup on cache miss
runs:
  using: composite
  steps:
    - name: Install apt packages
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libbsd-dev
    - name: Restore Cargo cache
      id: cargo-cache
      uses: actions/cache/restore@v5
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-${{ env.CACHE_KEY_ID }}
    - name: Setup on cache miss
      if: steps.cargo-cache.outputs.cache-hit != 'true'
      shell: bash
      run: cargo xtask precheck --setup
